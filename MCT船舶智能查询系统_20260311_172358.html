        window.onload = function() {
            displayResults(shipData);
        };

        function searchShips() {
            const name = document.getElementById('searchName').value.trim().toLowerCase();
            const code = document.getElementById('searchCode').value.trim().toLowerCase();
            const imo = document.getElementById('searchIMO').value.trim().toLowerCase();
            const owner = document.getElementById('searchOwner').value.trim().toLowerCase();
            const route = document.getElementById('searchRoute').value.trim().toLowerCase();

            const results = shipData.filter(ship => {
                const matchName = !name || (ship['船名'] && ship['船名'].toLowerCase().includes(name));
                const matchCode = !code || (ship['代码'] && ship['代码'].toLowerCase().includes(code));
                const matchIMO = !imo || (ship['IMO'] && String(ship['IMO']).toLowerCase().includes(imo));
                const matchOwner = !owner || (ship['船东'] && ship['船东'].toLowerCase().includes(owner));
                const matchRoute = !route || (ship['航线名'] && ship['航线名'].toLowerCase().includes(route));
                return matchName && matchCode && matchIMO && matchOwner && matchRoute;
            });

            displayResults(results);
        }

        function clearSearch() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchCode').value = '';
            document.getElementById('searchIMO').value = '';
            document.getElementById('searchOwner').value = '';
            document.getElementById('searchRoute').value = '';
            displayResults(shipData);
        }

        function displayResults(data) {
            const container = document.getElementById('resultsTable');
            const countLabel = document.getElementById('resultCount');

            countLabel.textContent = '共找到 ' + data.length + ' 条记录';

            if (data.length === 0) {
                container.innerHTML = '<div class="no-results"><div style="font-size: 3rem; margin-bottom: 10px;">🔍</div><p>未找到匹配的船舶记录</p><p style="font-size: 0.85rem; margin-top: 10px;">请检查查询条件后重试</p></div>';
                return;
            }

            let html = '<table><thead><tr>';
            const headers = ['序号', '代码', 'IMO', '船名', 'LOA', 'BTS', '船东', '航线名', '船体新旧', '导槽类型', '锁销类型', '锁销数量', '加固类型', '有无加固桥', '是否有固定护栏', '是否液压舱', '备注'];
            headers.forEach(h => html += '<th>' + h + '</th>');
            html += '</tr></thead><tbody>';

            data.forEach(ship => {
                html += '<tr>';
                headers.forEach(key => {
                    let value = ship[key] || '';
                    if (key === '船名') {
                        html += '<td class="ship-name">' + value + '</td>';
                    } else if (key === '备注') {
                        html += '<td class="remark" title="' + value + '">' + (value.length > 30 ? value.substring(0, 30) + '...' : value) + '</td>';
                    } else {
                        html += '<td>' + value + '</td>';
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchShips();
        });
